services:

  # ── Ollama (LLM local) ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ── App (FastAPI) ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    env_file: .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-kimi-k2.6:cloud}
      - OPIK_API_KEY=${OPIK_API_KEY}
      - OPIK_WORKSPACE=${OPIK_WORKSPACE}
      - OPIK_PROJECT_NAME=${OPIK_PROJECT_NAME}
    volumes:
      - chroma_data:/app/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 600s

volumes:
  ollama_data:
  chroma_data:
